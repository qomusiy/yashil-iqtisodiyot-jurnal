      'Temirkhanova Mutabar Jurayevna. Methodological deficiencies and the integration of green accounting in Uzbekistan\'s environmental audits: an operational analysis',
      'Satdirdinov Bakhodir Bakhtiyarovich. Issues in improving the internal audit system for lease operations'
    ];

    const boardMembers = [
      'proff. A.A. Karimov',
      'proff. U.A. Nurmanov',
      'proff. A.Z. Avloqulov',
      'proff. S.N. Tashnazarov',
      'dots. M.Sh. Mamatqulov',
      'dots. M.J. Temirxanova',
      'dots. A.Z. Tabayev',
      'dots. Sh.I. Xadjimuhammedova',
      'dots. R.G. Tashbayeva',
      'dots. X.U. Do‘stmuhammad',
      'dots. D.S. Tashnazarova'
    ];

    const issueFilePath = 'journals/jurnal 1-son.docx';
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuOpen = document.getElementById('menu-open');
    const menuClose = document.getElementById('menu-close');
    const navLinks = document.querySelectorAll('.nav-link, .mobile-link');
    const sections = document.querySelectorAll('section[id], footer[id]');
    let currentLang = 'uz';

    function card(label, value) {
      return `<div class="rounded-2xl border border-slate-200 bg-slate-50 p-4"><p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">${label}</p><p class="mt-2 font-semibold text-slate-900">${value}</p></div>`;
    }

    function renderLanguage(lang) {
      currentLang = lang;
      const t = journalData[lang];
      document.documentElement.lang = lang;
      document.title = t.pageTitle;
      document.querySelector('meta[name="description"]').setAttribute('content', t.pageDescription);

      document.getElementById('brand-name').textContent = t.brandName;
      document.getElementById('nav-about').textContent = t.nav.about;
      document.getElementById('nav-issue').textContent = t.nav.issue;
      document.getElementById('nav-archive').textContent = t.nav.archive;
      document.getElementById('nav-authors').textContent = t.nav.authors;
      document.getElementById('nav-board').textContent = t.nav.board;
      document.getElementById('nav-contact').textContent = t.nav.contact;
      document.getElementById('m-nav-about').textContent = t.nav.about;
      document.getElementById('m-nav-issue').textContent = t.nav.issue;
      document.getElementById('m-nav-archive').textContent = t.nav.archive;
      document.getElementById('m-nav-authors').textContent = t.nav.authors;
      document.getElementById('m-nav-board').textContent = t.nav.board;
      document.getElementById('m-nav-contact').textContent = t.nav.contact;
      document.getElementById('header-submit').textContent = t.headerSubmit;
      document.getElementById('mobile-submit').textContent = t.headerSubmit;

      document.getElementById('hero-kicker').textContent = t.hero.kicker;
      document.getElementById('hero-title').textContent = t.hero.title;
      document.getElementById('hero-text').textContent = t.hero.text;
      document.getElementById('hero-download').textContent = t.hero.download;
      document.getElementById('hero-download').href = issueFilePath;
      document.getElementById('hero-submit').textContent = t.hero.submit;

      document.getElementById('issue-label').textContent = t.issueCard.label;
      document.getElementById('issue-title').textContent = t.issueCard.title;
      document.getElementById('issue-summary').textContent = t.issueCard.summary;
      document.getElementById('featured-label').textContent = t.issueCard.featuredLabel;
      document.getElementById('featured-download').textContent = t.issueCard.featuredDownload;
      document.getElementById('featured-download').href = issueFilePath;
      document.getElementById('featured-contact').textContent = t.issueCard.featuredContact;
      document.getElementById('featured-list').innerHTML = t.issueCard.featured.map((item, index) => `<div class="${index < t.issueCard.featured.length - 1 ? 'border-b border-white/10 pb-4' : ''}"><p class="font-semibold">${item[0]}</p><p class="mt-1 text-sm text-white/70">${item[1]}</p></div>`).join('');
      document.getElementById('issue-stats').innerHTML = t.issueCard.stats.map(([label, value]) => card(label, value)).join('');

      document.getElementById('about-kicker').textContent = t.about.kicker;
      document.getElementById('about-title').textContent = t.about.title;
      document.getElementById('about-text').textContent = t.about.text;
      document.getElementById('about-tags').innerHTML = t.about.tags.map(tag => `<span class="rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-soft">${tag}</span>`).join('');
      document.getElementById('about-cards').innerHTML = t.about.cards.map(([title, text]) => `<div class="rounded-[26px] border border-slate-200 bg-white p-6 shadow-soft"><h3 class="text-lg font-bold text-slate-900">${title}</h3><p class="mt-3 text-sm leading-7 text-slate-600">${text}</p></div>`).join('');

      document.getElementById('current-kicker').textContent = t.current.kicker;
      document.getElementById('current-title').textContent = t.current.title;
      document.getElementById('current-text').textContent = t.current.text;
      document.getElementById('current-download').textContent = t.current.download;
      document.getElementById('current-download').href = issueFilePath;
      document.getElementById('details-title').textContent = t.current.detailsTitle;
      document.getElementById('details-grid').innerHTML = t.current.details.map(([label, value]) => `<div class="rounded-2xl bg-white p-4"><p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">${label}</p><p class="mt-2 font-semibold leading-7 text-slate-900">${value}</p></div>`).join('');
      document.getElementById('articles-title').textContent = t.current.articlesTitle;
      document.getElementById('articles-count').textContent = t.current.countLabel;
      document.getElementById('articles-list').innerHTML = articles.map((article, index) => `<article class="py-5 ${index === 0 ? 'first:pt-0' : ''}"><p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">${index + 1}</p><h3 class="mt-2 text-base font-semibold leading-7 text-slate-900">${article}</h3></article>`).join('');

      document.getElementById('archive-kicker').textContent = t.archive.kicker;
      document.getElementById('archive-title').textContent = t.archive.title;
      document.getElementById('archive-text').textContent = t.archive.text;
      document.getElementById('archive-cards').innerHTML = t.archive.cards.map((item, index) => {
        const [year, volume, text, issue, status, action] = item;
        const dashed = index > 0 ? 'border-dashed border-slate-300 bg-slate-50' : 'border-slate-200 bg-white shadow-soft';
        const actionHtml = index === 0
          ? `<a href="${issueFilePath}" download class="mt-5 inline-flex items-center justify-center rounded-full bg-brand px-5 py-3 text-sm font-semibold text-white transition hover:bg-brandDark">${action}</a>`
          : `<div class="mt-5 inline-flex items-center justify-center rounded-full border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-500">${action}</div>`;
        return `<div class="rounded-[28px] border ${dashed} p-6"><p class="text-xs font-semibold uppercase tracking-[0.18em] ${index === 0 ? 'text-brand' : 'text-slate-500'}">${year}</p><h3 class="mt-3 text-2xl font-bold text-slate-900">${volume}</h3><p class="mt-3 text-sm leading-7 text-slate-600">${text}</p><div class="mt-5 flex items-center justify-between rounded-2xl ${index === 0 ? 'bg-slate-50 text-slate-700' : 'bg-white text-slate-500'} px-4 py-3 text-sm font-semibold"><span>${issue}</span><span>${status}</span></div>${actionHtml}</div>`;
      }).join('');

      document.getElementById('authors-kicker').textContent = t.authors.kicker;
      document.getElementById('authors-title').textContent = t.authors.title;
      document.getElementById('authors-text').textContent = t.authors.text;
      document.getElementById('authors-submit').textContent = t.authors.submit;
      document.getElementById('authors-contact').textContent = t.authors.contact;
      document.getElementById('authors-cards').innerHTML = t.authors.cards.map(([title, text]) => `<div class="rounded-[26px] border border-slate-200 bg-slate-50 p-6"><h3 class="text-lg font-bold text-slate-900">${title}</h3><p class="mt-3 text-sm leading-7 text-slate-600">${text}</p></div>`).join('');

      document.getElementById('board-kicker').textContent = t.board.kicker;
      document.getElementById('board-title').textContent = t.board.title;
      document.getElementById('board-text').textContent = t.board.text;
      document.getElementById('board-leads').innerHTML = t.board.leads.map(([role, name, text]) => `<div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-soft"><p class="text-xs font-semibold uppercase tracking-[0.18em] text-brand">${role}</p><h3 class="mt-3 text-xl font-bold text-slate-900">${name}</h3><p class="mt-4 text-sm leading-7 text-slate-600">${text}</p></div>`).join('');
      document.getElementById('board-members-title').textContent = t.board.membersTitle;
      document.getElementById('board-members-count').textContent = t.board.membersCount;
      document.getElementById('board-members').innerHTML = boardMembers.map(name => `<div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-700">${name}</div>`).join('');

      document.getElementById('contact-kicker').textContent = t.contact.kicker;
      document.getElementById('contact-title').textContent = t.contact.title;
      document.getElementById('contact-text').textContent = t.contact.text;
      document.getElementById('contact-email-label').textContent = t.contact.emailLabel;
      document.getElementById('contact-phone-label').textContent = t.contact.phoneLabel;
      document.getElementById('contact-telegram-label').textContent = t.contact.telegramLabel;
      document.getElementById('contact-site-label').textContent = t.contact.siteLabel;
      document.getElementById('contact-address-label').textContent = t.contact.addressLabel;
      document.getElementById('contact-address').textContent = t.contact.address;
      document.getElementById('footer-info-title').textContent = t.contact.footerInfoTitle;
      document.getElementById('footer-info-text').textContent = t.contact.footerInfoText;
      document.getElementById('footer-model-title').textContent = t.contact.footerModelTitle;
      document.getElementById('footer-model-text').textContent = t.contact.footerModelText;
      document.getElementById('footer-status-title').textContent = t.contact.footerStatusTitle;
      document.getElementById('footer-status-text').textContent = t.contact.footerStatusText;
      document.getElementById('lang-select').value = lang;
      document.getElementById('lang-select-mobile').value = lang;
    }

    menuToggle.addEventListener('click', () => {
      const isOpen = !mobileMenu.classList.contains('hidden');
      mobileMenu.classList.toggle('hidden');
      menuOpen.classList.toggle('hidden');
      menuClose.classList.toggle('hidden');
      menuToggle.setAttribute('aria-expanded', String(!isOpen));
    });

    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.add('hidden');
        menuOpen.classList.remove('hidden');
        menuClose.classList.add('hidden');
        menuToggle.setAttribute('aria-expanded', 'false');
      });
    });
    document.getElementById('lang-select').addEventListener('change', (e) => renderLanguage(e.target.value));
    document.getElementById('lang-select-mobile').addEventListener('change', (e) => renderLanguage(e.target.value));

    function setActiveLink() {
      let current = 'about';
      sections.forEach(section => {
        const top = window.scrollY;
        const offset = section.offsetTop - 130;
        const height = section.offsetHeight;
        if (top >= offset && top < offset + height) current = section.id;
      });
      navLinks.forEach(link => {
        const href = link.getAttribute('href').replace('#', '');
        link.classList.toggle('active', href === current);
      });
    }

    window.addEventListener('scroll', setActiveLink);
    window.addEventListener('load', () => {
      renderLanguage('uz');
      setActiveLink();
    });
  </script>
</body>
</html>
